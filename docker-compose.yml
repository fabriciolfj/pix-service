# ================================================================
# Docker Compose completo — pix-payment-service + todas as deps
#
# Dependências reais → simuladas com MockServer:
#   DICT (BACEN)    → mockserver-dict:1080
#   Keycloak (OAuth2) → keycloak:8080 (real)
#   SPI Connector   → mockserver-spi:1080
#   Merchant webhook → mockserver-spi:1080 (mesma instância)
#
# Infraestrutura real:
#   PostgreSQL, Kafka, Kafka UI
# ================================================================

networks:
  pix-net:
    driver: bridge

services:

  # ============================================================
  # INFRAESTRUTURA REAL
  # ============================================================

  postgres:
    image: postgres:16-alpine
    container_name: pix-postgres
    networks: [pix-net]
    environment:
      POSTGRES_DB:       pixdb
      POSTGRES_USER:     pix
      POSTGRES_PASSWORD: pix
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pix -d pixdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: pix-zookeeper
    networks: [pix-net]
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD", "echo", "ruok"]
      interval: 10s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: pix-kafka
    networks: [pix-net]
    depends_on:
      zookeeper: { condition: service_healthy }
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      # Tópicos criados automaticamente ao subir
      KAFKA_CREATE_TOPICS: >
        pix.pagamento.solicitado:1:1,
        pix.pagamento.solicitado-retry-0:1:1,
        pix.pagamento.solicitado-retry-1:1:1,
        pix.pagamento.solicitado-retry-2:1:1,
        pix.pagamento.solicitado-dlt:1:1,
        pix.pagamento.liquidado:1:1,
        pix.pagamento.rejeitado:1:1
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      retries: 10

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: pix-kafka-ui
    networks: [pix-net]
    depends_on:
      kafka: { condition: service_healthy }
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: pix-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092

  # ============================================================
  # MOCKSERVER — DICT (BACEN)
  # Simula: GET/POST/DELETE /api/v2/dict/key/{key}
  # Dashboard: http://localhost:1081/mockserver/dashboard
  # ============================================================
  mockserver-dict:
    image: mockserver/mockserver:5.15.0
    container_name: pix-mockserver-dict
    networks: [pix-net]
    ports:
      - "1081:1080"
    environment:
      MOCKSERVER_LOG_LEVEL: INFO
      MOCKSERVER_SERVER_PORT: 1080
      MOCKSERVER_INITIALIZATION_JSON_PATH: /config/expectations.json
    volumes:
      - ./mockserver/dict/expectations.json:/config/expectations.json:ro
      - ./mockserver/mockserver.properties:/config/mockserver.properties:ro


  # ============================================================
  # KEYCLOAK — OAuth2 / JWT real
  # Admin console: http://localhost:8180
  # Token:         POST http://localhost:8180/realms/pix/protocol/openid-connect/token
  # ============================================================
  keycloak:
    image: quay.io/keycloak/keycloak:24.0.1
    container_name: pix-keycloak
    networks: [pix-net]
    ports:
      - "8180:8080"
    environment:
      KEYCLOAK_ADMIN:          admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HTTP_ENABLED:         "true"
      KC_HOSTNAME_STRICT:      "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
    command:
      - start-dev
      - --import-realm
    volumes:
      - ./keycloak/pix-realm.json:/opt/keycloak/data/import/pix-realm.json:ro
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /health/ready HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n' >&3 && cat <&3 | grep -q '200'"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 40s


  # ============================================================
  # MOCKSERVER — SPI Connector + Merchant Webhook receiver
  # Simula: POST /spi/pagamento         (envio para BACEN)
  #         GET  /spi/pagamento/{e2eId} (consulta status)
  #         POST /pix/notificacao       (callback do merchant)
  # Dashboard: http://localhost:1083/mockserver/dashboard
  # ============================================================
  mockserver-spi:
    image: mockserver/mockserver:5.15.0
    container_name: pix-mockserver-spi
    networks: [pix-net]
    ports:
      - "1083:1080"
    environment:
      MOCKSERVER_LOG_LEVEL: INFO
      MOCKSERVER_SERVER_PORT: 1080
      MOCKSERVER_INITIALIZATION_JSON_PATH: /config/expectations.json
    volumes:
      - ./mockserver/spi/expectations.json:/config/expectations.json:ro
      - ./mockserver/mockserver.properties:/config/mockserver.properties:ro


  # ============================================================
  # INIT — carrega expectations dinamicamente (opcional,
  # pois já usamos MOCKSERVER_INITIALIZATION_JSON_PATH acima,
  # mas útil para recarregar sem reiniciar o container)
  # ============================================================
  mockserver-init:
    image: curlimages/curl:8.6.0
    container_name: pix-mockserver-init
    networks: [pix-net]
    depends_on:
      mockserver-dict:     { condition: service_started }
      mockserver-spi:      { condition: service_started }
    volumes:
      - ./mockserver:/expectations:ro
      - ./mockserver/init-mockserver.sh:/init-mockserver.sh:ro
    entrypoint: ["sh", "/init-mockserver.sh"]
    restart: "no"

  # ============================================================
  # Observabilidade
  # ============================================================
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: pix-prometheus
    networks: [pix-net]
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana:10.4.0
    container_name: pix-grafana
    networks: [pix-net]
    depends_on: [prometheus]
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
