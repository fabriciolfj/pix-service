kafka.bootstrap.servers=localhost:9092
mp.messaging.incoming.processing-payment-in.auto.offset.reset=earliest

mp.messaging.outgoing.processing-payment-out.connector=smallrye-kafka
mp.messaging.outgoing.processing-payment-out.topic=processing-payment
mp.messaging.outgoing.processing-payment-out.value.serializer=org.apache.kafka.common.serialization.StringSerializer
mp.messaging.outgoing.processing-payment-out.key.serializer=org.apache.kafka.common.serialization.StringSerializer

mp.messaging.incoming.processing-payment-in.topic=processing-payment
mp.messaging.incoming.processing-payment-in.connector=smallrye-kafka
mp.messaging.incoming.processing-payment-in.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.processing-payment-in.key.deserializer=org.apache.kafka.common.serialization.StringDeserializer

quarkus.openapi-generator.codegen.spec.openapi_yml.model-name-prefix=QuarkusOpenApiGenerator
quarkus.hibernate-reactive.database.generation=none
quarkus.hibernate-reactive.schema-management.strategy=none
quarkus.hibernate-orm.enabled=true
quarkus.flyway.jdbc-url=jdbc:postgresql://localhost:5432/pixdb
quarkus.flyway.username=pix
quarkus.flyway.password=pix
quarkus.flyway.baseline-on-migrate=true
quarkus.flyway.locations=db/migration
quarkus.flyway.migrate-at-start=true

quarkus.datasource.jdbc=true
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=pix
quarkus.datasource.password=pix
quarkus.datasource.reactive.max-size=20
quarkus.datasource.reactive.url=postgresql://localhost:5432/pixdb
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/pixdb
quarkus.datasource.jdbc.driver=org.postgresql.Driver

quarkus.http.port=8080


quarkus.rest-client.pix-dict.url=${DICT_BASE_URL:http://localhost:1081}
pix.pagamento.solicitado=pix.pagamento.solicitado
# Certifique-se que está exatamente assim
shedlock.defaults.lock-at-most-for=PT30S